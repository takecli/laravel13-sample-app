services:
  app:
    build: './docker/app'
    volumes:
      - ./:/work
  
  web:
    image: nginx:1.20-alpine
    ports:
      - 7888:80
    volumes:
      - ./public:/work/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    working_dir: /work
    depends_on:
      - app

  mysql:
    image: mysql/mysql-server:8.0.23
    environment:
        MYSQL_ROOT_PASSWORD: root
        TZ: Asia/Tokyo
        MYSQL_ROOT_HOST: '%'
    ports:
        - 6306:3306
    volumes:
        - learning-portal-data:/var/lib/mysql
        - ./docker/mysql/conf.d:/etc/mysql/conf.d

  tbls:
    image: ghcr.io/k1low/tbls
    environment:
        DB_USERNAME: root
        DB_PASSWORD: root
        DB_HOST: localhost
        DB_PORT: 6306
        DB_DATABASE: learning_portal
    volumes:
        - .:/work
    working_dir: /work
    command: "version"

volumes:
    learning-portal-data:
    