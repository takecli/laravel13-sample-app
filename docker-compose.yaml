services:
  app:
    build: './docker/app'
    volumes:
      - ./:/work
    networks:
      - laravel13-sample-app-network
      - keycloak-network
  
  web:
    image: nginx:1.20-alpine
    ports:
      - 7888:80
    volumes:
      - ./public:/work/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel13-sample-app-network
      - keycloak-network
    working_dir: /work
    depends_on:
      - app

  mysql:
    image: mysql/mysql-server:8.0.23
    environment:
        MYSQL_ROOT_PASSWORD: root
        TZ: Asia/Tokyo
        MYSQL_ROOT_HOST: '%'
    ports:
        - 6306:3306
    volumes:
        - learning-portal-data:/var/lib/mysql
        - ./docker/mysql/conf.d:/etc/mysql/conf.d
    networks:
      - laravel13-sample-app-network
      - keycloak-network

  tbls:
    image: ghcr.io/k1low/tbls
    environment:
        DB_USERNAME: root
        DB_PASSWORD: root
        DB_HOST: localhost
        DB_PORT: 6306
        DB_DATABASE: learning_portal
    volumes:
        - .:/work
    working_dir: /work
    command: "version"

  localstack:
    image: localstack/localstack:3
    environment:
        - SERVICES=s3,lambda
        - AWS_ACCESS_KEY_ID=dummy
        - AWS_SECRET_ACCESS_KEY=dummy
        - AWS_DEFAULT_REGION=ap-northeast-1
    volumes:
        - ./localstack:/var/lib/localstack
        - /var/run/docker.sock:/var/run/docker.sock
        - ./docker/localstack/ready.d/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh
    ports:
        - 4566:4566
    networks:
      - laravel13-sample-app-network
      - keycloak-network

volumes:
    learning-portal-data:
    
networks:
  laravel13-sample-app-network:
    name: laravel13-sample-app-network
    driver: bridge
  keycloak-network:
    external: true
    name: keycloak-network